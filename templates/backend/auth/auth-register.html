<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(30, 41, 59, 0.8); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-md">
        <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white">Create Account</h1>
                <p class="text-gray-500 dark:text-gray-300 mt-2">Join us and start your journey</p>
            </div>

            <form id="regForm" action="{{ url_for('main.register') }}" method="POST" class="space-y-4">
                <div class="relative">
                    <input id="username" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all dark:bg-gray-800 dark:border-gray-600 dark:text-white"
                        type="text" name="username" placeholder="Username" required />
                    <div id="suggestionBox" class="hidden mt-2 p-3 bg-red-50 dark:bg-red-900/20 rounded-xl">
                        <p class="text-xs text-red-600 dark:text-red-400 font-bold mb-1">Username is taken. Try these:</p>
                        <div id="suggestions" class="flex gap-2"></div>
                    </div>
                </div>
                
                <input class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all dark:bg-gray-800 dark:border-gray-600 dark:text-white"
                    type="text" name="fullname" placeholder="Fullname" required />
                <input class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all dark:bg-gray-800 dark:border-gray-600 dark:text-white"
                    type="email" name="email" placeholder="Email address" required />
                
                <div class="relative">
                    <input id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all dark:bg-gray-800 dark:border-gray-600 dark:text-white"
                        type="password" name="password" placeholder="Password" required />
                    <button type="button" onclick="togglePass('password', 'eyeIcon1')" class="absolute right-4 top-4 text-gray-400">
                        <i id="eyeIcon1" class="fas fa-eye"></i>
                    </button>
                    <div class="mt-2 h-1.5 w-full bg-gray-200 rounded-full overflow-hidden">
                        <div id="strengthBar" class="h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <div class="relative">
                    <input id="confirm_password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all dark:bg-gray-800 dark:border-gray-600 dark:text-white"
                        type="password" name="password_confirmation" placeholder="Confirm Password" required />
                    <button type="button" onclick="togglePass('confirm_password', 'eyeIcon2')" class="absolute right-4 top-4 text-gray-400">
                        <i id="eyeIcon2" class="fas fa-eye"></i>
                    </button>
                </div>
                
                <button type="submit" class="w-full py-4 bg-gray-900 text-white rounded-xl font-bold hover:bg-black transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                    Register Account
                </button>
            </form>

            <div class="text-center text-sm text-gray-600 dark:text-gray-400">
                Already have an account? <a href="{{ url_for('main.login') }}" class="text-indigo-600 font-bold hover:underline">Login</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Password Toggle
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.className = "fas fa-eye-slash";
            } else {
                input.type = "password";
                icon.className = "fas fa-eye";
            }
        }

        // Strength Meter
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;
            const widths = ["0%", "25%", "50%", "75%", "100%"];
            const colors = ["bg-red-500", "bg-orange-500", "bg-yellow-500", "bg-blue-500", "bg-green-500"];
            strengthBar.style.width = widths[strength];
            strengthBar.className = `h-full transition-all duration-300 ${colors[strength]}`;
        });

        // Username Check
        const usernameInput = document.getElementById('username');
        const suggestionBox = document.getElementById('suggestionBox');
        const suggestionsDiv = document.getElementById('suggestions');

        usernameInput.addEventListener('blur', async () => {
            const val = usernameInput.value;
            if (val.length < 3) return;
            const res = await fetch('/check-username', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: val})
            });
            const data = await res.json();
            if (data.taken) {
                suggestionBox.classList.remove('hidden');
                suggestionsDiv.innerHTML = '';
                data.suggestions.forEach(s => {
                    const btn = document.createElement('span');
                    btn.className = "text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded cursor-pointer hover:bg-indigo-200";
                    btn.innerText = s;
                    btn.onclick = () => { usernameInput.value = s; suggestionBox.classList.add('hidden'); };
                    suggestionsDiv.appendChild(btn);
                });
            } else {
                suggestionBox.classList.add('hidden');
            }
        });

        // Flash
        const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};
        if (flashMessages.length > 0) {
            const [category, message] = flashMessages[0];
            Swal.fire({ toast: true, position: 'top-end', icon: category === "success" ? "success" : "error", title: message, showConfirmButton: false, timer: 3000, timerProgressBar: true });
        }
    </script>
</body>
</html>
