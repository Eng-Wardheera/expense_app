<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify OTP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .glass {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .otp-box {
            width: 50px;
            height: 55px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

<main class="w-full max-w-md">

    <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">

        <!-- Header -->
        <div class="text-center">
            <div class="text-4xl mb-2 text-indigo-600">
                <i class="fas fa-shield-alt"></i>
            </div>

            <h1 class="text-2xl font-extrabold text-gray-900">
                Verify OTP
            </h1>

            <p class="text-gray-500 mt-2">
                Enter the 6-digit code sent to your email
            </p>

            <p class="text-sm text-indigo-600 mt-1">
                {{ email }}
            </p>
        </div>

        <!-- Form -->
       <form method="POST" class="space-y-6" id="otpForm">

            <div class="flex justify-center space-x-2">

                <input maxlength="1" class="otp-box border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" type="text" inputmode="numeric">
                <input maxlength="1" class="otp-box border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" type="text" inputmode="numeric">
                <input maxlength="1" class="otp-box border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" type="text" inputmode="numeric">
                <input maxlength="1" class="otp-box border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" type="text" inputmode="numeric">
                <input maxlength="1" class="otp-box border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" type="text" inputmode="numeric">
                <input maxlength="1" class="otp-box border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" type="text" inputmode="numeric">

            </div>

            <input type="hidden" name="otp_code" id="otp_code">

            <button type="submit"
                    class="w-full py-4 bg-gray-900 text-white rounded-xl font-bold hover:bg-black transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                Verify OTP
            </button>

        </form>

        <!-- Resend -->
        <div class="text-center text-sm text-gray-600">
            Didn’t receive code?
            <a href="{{ url_for('main.forgot_password') }}"
               class="text-indigo-600 font-bold hover:underline ml-1">
                Resend OTP
            </a>
        </div>

        <!-- Back -->
        <div class="text-center text-sm text-gray-600">
            <a href="{{ url_for('main.login') }}"
               class="text-gray-500 hover:text-indigo-600">
                ← Back to login
            </a>
        </div>

    </div>

</main>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const autoOtp = urlParams.get("otp");

    const inputs = document.querySelectorAll(".otp-box");
    const hiddenInput = document.getElementById("otp_code");
    const form = document.getElementById("otpForm");

    // =========================
    // AUTO FILL OTP FROM LINK
    // =========================
    if (autoOtp && autoOtp.length === 6) {
        inputs.forEach((input, index) => {
            input.value = autoOtp[index] || "";
        });

        hiddenInput.value = autoOtp;

        // OPTIONAL: auto submit
        setTimeout(() => {
            form.submit();
        }, 800);
    }

    // =========================
    // MANUAL INPUT HANDLING
    // =========================
    inputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
            if (e.target.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }

            let otp = "";
            inputs.forEach(i => otp += i.value);
            hiddenInput.value = otp;
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
</script>

</body>
</html>
