<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .glass {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

<main class="w-full max-w-md">

    <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">

        <!-- Header -->
        <div class="text-center">
            <div class="text-4xl mb-2 text-indigo-600">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900">
                Forgot Password
            </h1>
            <p class="text-gray-500 mt-2">
                Enter your email to receive OTP code
            </p>
        </div>

        <!-- Flash messages handled by SweetAlert -->
        
        <!-- Form -->
        <form method="POST" class="space-y-5">

            <div>
                <label class="text-sm text-gray-600">Email Address</label>
                <input type="email"
                       name="email"
                       required
                       placeholder="Enter your email"
                       class="w-full px-4 py-3 mt-1 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all">
            </div>

            <button type="submit"
                    class="w-full py-4 bg-gray-900 text-white rounded-xl font-bold hover:bg-black transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                Send OTP
            </button>

        </form>

        <!-- Back to login -->
        <div class="text-center text-sm text-gray-600">
            Remember password?
            <a href="{{ url_for('main.login') }}"
               class="text-indigo-600 font-bold hover:underline ml-1">
                Login
            </a>
        </div>

    </div>

</main>

<!-- SweetAlert Flash -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};
    if (flashMessages.length > 0) {
        const [category, message] = flashMessages[0];

        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: category === "success" ? "success" : "error",
            title: message,
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        });
    }
</script>

</body>
</html>
