<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(30, 41, 59, 0.8); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-md">
        <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">
            
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white" id="title">Welcome Back</h1>
                <p class="text-gray-500 dark:text-gray-300 mt-2" id="subtitle">Sign in to your dashboard</p>
            </div>

            <form id="authForm" action="{{ url_for('main.login') }}" method="POST" class="space-y-5">
                <div>
                    <input class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all dark:bg-gray-800 dark:text-white"
                        type="email" name="email" placeholder="Email address" required />
                </div>
                
                <div class="relative">
                    <input id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all dark:bg-gray-800 dark:text-white"
                        type="password" name="password" placeholder="Password" required />
                    <button type="button" onclick="togglePass()" class="absolute right-4 top-4 text-gray-400 hover:text-indigo-600">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
                
                <button type="submit" class="w-full py-4 bg-gray-900 text-white rounded-xl font-bold hover:bg-black transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                    <span id="btnText">Login Account</span>
                </button>
            </form>

            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase font-bold">OR</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <a href="{{ url_for('main.login_google') }}" 
               class="flex items-center justify-center w-full py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-all dark:border-gray-600">
               <img class="w-5 h-5 mr-2" src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
               <span class="font-medium text-gray-700 dark:text-gray-200">Continue with Google</span>
            </a>

            <div class="text-center text-sm text-gray-600 dark:text-gray-400">
                <span id="toggleText">Don't have an account?</span> 
                <a href="{{ url_for('main.register') }}" class="text-indigo-600 font-bold hover:underline ml-1" id="toggleBtn">Register</button>
            </div>
        </div>
    </main>

    <script>
        // Password Show/Hide Logic
        function togglePass() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = "password";
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // Form Toggle Logic
        let isLogin = true;
        function toggleForm() {
            isLogin = !isLogin;
            const form = document.getElementById('authForm');
            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');
            const btnText = document.getElementById('btnText');
            const toggleText = document.getElementById('toggleText');
            const toggleBtn = document.getElementById('toggleBtn');

            if (isLogin) {
                form.action = "{{ url_for('main.login') }}";
                title.innerText = "Welcome Back";
                subtitle.innerText = "Sign in to your dashboard";
                btnText.innerText = "Login Account";
                toggleText.innerText = "Don't have an account?";
                toggleBtn.innerText = "Register";
            } else {
                form.action = "{{ url_for('main.register') }}";
                title.innerText = "Create Account";
                subtitle.innerText = "Join us and start your journey";
                btnText.innerText = "Create Account";
                toggleText.innerText = "Already have an account?";
                toggleBtn.innerText = "Login";
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};
        if (flashMessages.length > 0) {
            const [category, message] = flashMessages[0];
            Swal.fire({
                toast: true, position: 'top-end', icon: category === "success" ? "success" : "error",
                title: message, showConfirmButton: false, timer: 3000, timerProgressBar: true
            });
        }
    </script>
</body>
</html>
