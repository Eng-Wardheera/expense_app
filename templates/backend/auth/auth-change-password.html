<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

<main class="w-full max-w-md">

    <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">

        <!-- HEADER -->
        <div class="text-center">
            <div class="text-4xl mb-2 text-indigo-600">
                <i class="fas fa-lock"></i>
            </div>

            <h1 class="text-2xl font-extrabold text-gray-900">
                Change Password
            </h1>

            <p class="text-sm text-indigo-600 mt-1">
                {{ email }}
            </p>
        </div>

        <!-- FORM -->
        <form method="POST" class="space-y-5">

            <!-- PASSWORD -->
            <div class="relative">
                <input id="password"
                       type="password"
                       name="password"
                       placeholder="New Password"
                       required
                       class="w-full px-4 py-3 rounded-xl border focus:ring-4 focus:ring-indigo-500/20 outline-none">

                <button type="button"
                        onclick="togglePass('password','eye1')"
                        class="absolute right-4 top-4 text-gray-400 hover:text-indigo-600">
                    <i id="eye1" class="fas fa-eye"></i>
                </button>
            </div>

            <!-- STRENGTH BAR -->
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div id="strengthBar" class="h-full w-0 transition-all duration-300"></div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="relative">
                <input id="confirm_password"
                       type="password"
                       name="confirm_password"
                       placeholder="Confirm Password"
                       required
                       class="w-full px-4 py-3 rounded-xl border focus:ring-4 focus:ring-indigo-500/20 outline-none">

                <button type="button"
                        onclick="togglePass('confirm_password','eye2')"
                        class="absolute right-4 top-4 text-gray-400 hover:text-indigo-600">
                    <i id="eye2" class="fas fa-eye"></i>
                </button>
            </div>

            <!-- ERROR -->
            <p id="matchError" class="text-red-500 text-sm hidden">
                Passwords do not match
            </p>

            <!-- BUTTON -->
            <button id="submitBtn"
                    type="submit"
                    class="w-full py-4 bg-gray-900 text-white rounded-xl font-bold hover:bg-black transition-all">
                Change Password
            </button>

        </form>

        <!-- BACK -->
        <div class="text-center text-sm text-gray-600">
            <a href="{{ url_for('main.login') }}"
               class="hover:text-indigo-600">
                ← Back to Login
            </a>
        </div>

    </div>

</main>

<!-- SCRIPT -->
<script>

    // =========================
    // TOGGLE PASSWORD
    // =========================
    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        if (input.type === "password") {
            input.type = "text";
            icon.className = "fas fa-eye-slash";
        } else {
            input.type = "password";
            icon.className = "fas fa-eye";
        }
    }

    // =========================
    // PASSWORD STRENGTH
    // =========================
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let strength = 0;

        if (val.length >= 8) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;

        const widths = ["0%", "25%", "50%", "75%", "100%"];
        const colors = [
            "bg-red-500",
            "bg-orange-500",
            "bg-yellow-500",
            "bg-blue-500",
            "bg-green-500"
        ];

        strengthBar.style.width = widths[strength];
        strengthBar.className = "h-full transition-all duration-300 " + colors[strength];
    });

    // =========================
    // MATCH VALIDATION
    // =========================
    const confirm = document.getElementById("confirm_password");
    const error = document.getElementById("matchError");
    const submitBtn = document.getElementById("submitBtn");

    function checkMatch() {
        if (confirm.value && passwordInput.value !== confirm.value) {
            error.classList.remove("hidden");
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-50", "cursor-not-allowed");
        } else {
            error.classList.add("hidden");
            submitBtn.disabled = false;
            submitBtn.classList.remove("opacity-50", "cursor-not-allowed");
        }
    }

    passwordInput.addEventListener("input", checkMatch);
    confirm.addEventListener("input", checkMatch);

</script>

<!-- SWEET ALERT -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};

    if (flashMessages.length > 0) {
        const [category, message] = flashMessages[0];

        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: category === "success" ? "success" : "error",
            title: message,
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        });
    }
</script>


</body>
</html>
