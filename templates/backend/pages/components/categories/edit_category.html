{% extends 'backend/home/base.html' %}

{% block title %}Edit Category | Expense Tracker{% endblock %}

{% block content %}

<div class="main-content mt-4">

<form method="POST">

<div class="card shadow-sm">

    <!-- HEADER -->
    <div class="card-header bg-white">
        <h5 class="mb-0">Edit Category</h5>
    </div>

    <div class="card-body">

        <!-- CATEGORY NAME -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label fw-bold">Category Name</label>

            <div class="col-lg-9">
                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{ category.name }}"
                       required>
            </div>
        </div>

        <!-- TYPE -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label fw-bold">Type</label>

            <div class="col-lg-9">
                <select name="type" class="form-select">
                    <option value="income" {% if category.type == 'income' %}selected{% endif %}>Income</option>
                    <option value="expense" {% if category.type == 'expense' %}selected{% endif %}>Expense</option>
                </select>
            </div>
        </div>

        <!-- ITEMS -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label fw-bold">Items</label>

            <div class="col-lg-9">

                <div class="input-group mb-2">
                    <input type="text" id="itemInput" class="form-control" placeholder="Add or edit item...">
                    <button type="button" class="btn btn-success" onclick="addItem()">
                        Add
                    </button>
                </div>

                <div id="itemList" class="d-flex flex-wrap gap-2"></div>

                <input type="hidden" name="items" id="itemsHidden">

            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="card-footer text-center">
        <button class="btn btn-primary px-4">
            Update Category
        </button>
    </div>

</div>

</form>

</div>

<!-- JS -->
<script>


// SAFE LOAD FROM BACKEND
let items = {{ category["items"] | default([]) | tojson }};

// RENDER
renderItems();

// ADD ITEM
function addItem() {

    let input = document.getElementById("itemInput");
    let value = input.value.trim();

    if (value === "") return;

    if (!items.includes(value)) {
        items.push(value);
    }

    input.value = "";
    renderItems();
}

// DELETE ITEM
function removeItem(index) {
    items.splice(index, 1);
    renderItems();
}

// EDIT ITEM (CLICK BADGE TO EDIT)
function editItem(index) {
    let newValue = prompt("Edit item:", items[index]);

    if (newValue && newValue.trim() !== "") {
        items[index] = newValue.trim();
        renderItems();
    }
}

// RENDER ITEMS
function renderItems() {

    let list = document.getElementById("itemList");
    let hidden = document.getElementById("itemsHidden");

    list.innerHTML = "";

    items.forEach((item, index) => {
        list.innerHTML += `
            <span class="badge bg-primary d-flex align-items-center gap-2 p-2"
                  style="cursor:pointer"
                  onclick="editItem(${index})">

                ${item}

                <button type="button" class="btn-close btn-close-white"
                        onclick="event.stopPropagation(); removeItem(${index})"></button>

            </span>
        `;
    });

    hidden.value = JSON.stringify(items);
}

</script>

{% endblock %}
