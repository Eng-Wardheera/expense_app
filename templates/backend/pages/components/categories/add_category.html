{% extends 'backend/home/base.html' %}

{% block title %}Add New Category | Expense Tracker{% endblock %}

{% block content %}

<div class="main-content mt-4">

<form method="POST">

<div class="card shadow-sm">

    <div class="card-header bg-white">
        <h5 class="mb-0">Add New Category</h5>
    </div>

    <div class="card-body">

        <!-- CATEGORY NAME -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label fw-bold">Category Name</label>

            <div class="col-lg-9">
                <select name="name" class="form-select" required>
                    <option value="">-- Select Category --</option>
                    <option value="Dakhli (Income)">Dakhli (Income)</option>
                    <option value="Waxbarasho">Waxbarasho</option>
                    <option value="Nolosha Maalinlaha ah">Nolosha Maalinlaha ah</option>
                    <option value="Caafimaad">Caafimaad</option>
                    <option value="Utility & Transport">Utility & Transport</option>
                    <option value="Cunto & Madadaalo">Cunto & Madadaalo</option>
                    <option value="Events & Social">Events & Social</option>
                    <option value="Kale (Misc)">Kale (Misc)</option>
                </select>
            </div>
        </div>

        <!-- TYPE -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label fw-bold">Type</label>

            <div class="col-lg-9">
                <select name="type" class="form-select">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
        </div>

        <!-- ITEMS (MANUAL ONLY) -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label fw-bold">Items</label>

            <div class="col-lg-9">

                <div class="input-group mb-2">
                    <input type="text" id="itemInput" class="form-control" placeholder="Type item and click Add">
                    <button type="button" class="btn btn-success" onclick="addItem()">
                        Add
                    </button>
                </div>

                <div id="itemList" class="d-flex flex-wrap gap-2"></div>

                <input type="hidden" name="items" id="itemsHidden">

            </div>
        </div>

    </div>

    <div class="card-footer text-center">
        <button class="btn btn-primary px-4">
            Save Category
        </button>
    </div>

</div>

</form>

</div>

<!-- JS -->
<script>

let items = [];

// ADD ITEM ONLY (NO DEFAULTS)
function addItem() {
    let input = document.getElementById("itemInput");
    let value = input.value.trim();

    if (value === "") return;

    if (!items.includes(value)) {
        items.push(value);
        renderItems();
    }

    input.value = "";
}

// REMOVE ITEM
function removeItem(index) {
    items.splice(index, 1);
    renderItems();
}

// RENDER ITEMS
function renderItems() {
    let list = document.getElementById("itemList");
    let hidden = document.getElementById("itemsHidden");

    list.innerHTML = "";

    items.forEach((item, index) => {
        list.innerHTML += `
            <span class="badge bg-primary d-flex align-items-center gap-2 p-2">
                ${item}
                <button type="button" class="btn-close btn-close-white"
                        onclick="removeItem(${index})"></button>
            </span>
        `;
    });

    hidden.value = items.join(",");
}

</script>

{% endblock %}
