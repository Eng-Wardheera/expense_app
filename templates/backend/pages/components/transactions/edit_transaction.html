{% extends 'backend/home/base.html' %}

{% block title %}Edit Transaction{% endblock %}

{% block content %}
<div class="main-content mt-4">
    <form method="POST" id="editTransactionForm">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3">
                <h5 class="mb-0 fw-bold text-primary">Edit Transaction</h5>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <label class="col-lg-3 col-form-label fw-bold">Account</label>
                    <div class="col-lg-9">
                        <select name="account_id" id="accountSelect" class="form-select" required>
                            {% for account in accounts %}
                            <option value="{{ account._id }}" 
                                    data-balance="{{ account.balance }}"
                                    {% if account._id|string == transaction.account_id|string %}selected{% endif %}>
                                {{ account.name }} | {{ account.balance }} {{ account.currency }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-lg-3 col-form-label fw-bold">Type</label>
                    <div class="col-lg-9">
                        <select name="transaction_type" id="typeSelect" class="form-select" required>
                            <option value="income" {% if transaction.transaction_type == 'income' %}selected{% endif %}>Income (+)</option>
                            <option value="expense" {% if transaction.transaction_type == 'expense' %}selected{% endif %}>Expense (-)</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-lg-3 col-form-label fw-bold">Category</label>
                    <div class="col-lg-9">
                        <select name="category" id="categorySelect" class="form-select" required>
                            <option value="">-- Select Category --</option>
                            {% for cat in categories %}
                            <option value="{{ cat._id }}" data-type="{{ cat.type }}"
                                    {% if cat.name == transaction.category %}selected{% endif %}>
                                {{ cat.name }} ({{ cat.type }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-lg-3 col-form-label fw-bold">Item</label>
                    <div class="col-lg-9">
                        <select name="item" id="itemSelect" class="form-select">
                            <option value="">-- Select Item --</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-lg-3 col-form-label fw-bold">Amount</label>
                    <div class="col-lg-9">
                        <input type="number" step="0.01" name="amount" id="amountInput" 
                               value="{{ transaction.amount }}" class="form-control" required>
                        <div id="balanceWarning" class="text-danger small mt-1" style="display:none;">
                            Digniin: Lacagtaan way ka badan tahay balance-ka akaunkaaga!
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer text-end d-flex justify-content-end" style="gap: 10px;">
                <button type="submit" class="btn btn-primary px-4" id="submitBtn">Update Transaction</button>
                <a href="{{ url_for('main.transaction_list') }}" class="btn btn-secondary px-4">Cancel</a>
            </div>
        </div>
    </form>
</div>

<script>
    const categories = {{ categories | tojson | safe }};
    const accounts = {{ accounts | tojson | safe }};
    
    const typeSelect = document.getElementById("typeSelect");
    const categorySelect = document.getElementById("categorySelect");
    const itemSelect = document.getElementById("itemSelect");
    const accountSelect = document.getElementById("accountSelect");
    const amountInput = document.getElementById("amountInput");
    const balanceWarning = document.getElementById("balanceWarning");
    const submitBtn = document.getElementById("submitBtn");

    const selectedItem = "{{ transaction.item }}";

    // 1. Function si loo shaandheeyo Category marka Type la beddelo
    function filterCategories() {
        const type = typeSelect.value;
        Array.from(categorySelect.options).forEach(opt => {
            if (opt.value === "") return;
            opt.style.display = (opt.getAttribute('data-type') === type) ? "block" : "none";
        });
    }

    // 2. Function si loo soo saaro Items
    function updateItems(categoryId) {
        const cat = categories.find(c => c._id === categoryId);
        const items = cat ? cat.items : [];
        
        itemSelect.innerHTML = '<option value="">-- Select Item --</option>';
        items.forEach(item => {
            const opt = document.createElement("option");
            opt.value = item;
            opt.textContent = item;
            if (item === selectedItem) opt.selected = true;
            itemSelect.appendChild(opt);
        });
    }

    // 3. Balance Validation
    function validateBalance() {
        if (typeSelect.value === 'expense') {
            const selectedAcc = accounts.find(a => a._id === accountSelect.value || a._id.$oid === accountSelect.value);
            const amount = parseFloat(amountInput.value) || 0;
            if (selectedAcc && amount > selectedAcc.balance) {
                balanceWarning.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                balanceWarning.style.display = 'none';
                submitBtn.disabled = false;
            }
        } else {
            balanceWarning.style.display = 'none';
            submitBtn.disabled = false;
        }
    }

    // Event Listeners
    typeSelect.addEventListener("change", () => { filterCategories(); categorySelect.value = ""; });
    categorySelect.addEventListener("change", function() { updateItems(this.value); });
    [typeSelect, accountSelect, amountInput].forEach(el => el.addEventListener("input", validateBalance));

    // Initialization
    filterCategories();
    if (categorySelect.value) updateItems(categorySelect.value);
    validateBalance();
</script>
{% endblock %}
