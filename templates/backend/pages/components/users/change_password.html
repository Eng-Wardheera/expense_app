{% extends 'backend/home/base.html' %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title">
            <h5 class="m-b-10">Users</h5>
        </div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('main.profile') }}">Profile</a></li>
            <li class="breadcrumb-item">Change Password</li>
        </ul>
    </div>
</div>

<br>

<div class="container-fluid">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <h4 class="mb-4 text-center">Change Password</h4>

                    <form method="POST" onsubmit="return validatePassword()">

                        <!-- Old Password -->
                        <div class="mb-3 position-relative">
                            <label class="form-label">Old Password</label>
                            <input type="password" id="old_password"
                                   name="old_password"
                                   class="form-control"
                                   required>

                            <i class="feather-eye toggle-password"
                               onclick="togglePassword('old_password', this)"
                               style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>
                        </div>

                        <!-- New Password -->
                        <div class="mb-3 position-relative">
                            <label class="form-label">New Password</label>
                            <input type="password" id="new_password"
                                   name="new_password"
                                   class="form-control"
                                   required>

                            <i class="feather-eye toggle-password"
                               onclick="togglePassword('new_password', this)"
                               style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>

                            <small id="strengthMsg" class="text-muted"></small>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3 position-relative">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="confirm_password"
                                   name="confirm_password"
                                   class="form-control"
                                   required>

                            <i class="feather-eye toggle-password"
                               onclick="togglePassword('confirm_password', this)"
                               style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>

                            <small id="matchMsg"></small>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Change Password
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- JS -->
<script>
function togglePassword(fieldId, icon) {
    let field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
        icon.setAttribute("data-feather", "eye-off");
    } else {
        field.type = "password";
        icon.setAttribute("data-feather", "eye");
    }
    feather.replace();
}

// Password validation
function validatePassword() {
    let newPass = document.getElementById("new_password").value;
    let confirmPass = document.getElementById("confirm_password").value;

    if (newPass.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
    }

    if (newPass !== confirmPass) {
        alert("Passwords do not match");
        return false;
    }

    return true;
}

// Live match check
document.getElementById("confirm_password").addEventListener("keyup", function () {
    let newPass = document.getElementById("new_password").value;
    let confirmPass = this.value;
    let msg = document.getElementById("matchMsg");

    if (confirmPass.length === 0) {
        msg.innerHTML = "";
        return;
    }

    if (newPass === confirmPass) {
        msg.innerHTML = "✔ Passwords match";
        msg.style.color = "green";
    } else {
        msg.innerHTML = "✖ Passwords do not match";
        msg.style.color = "red";
    }
});

// Optional strength indicator
document.getElementById("new_password").addEventListener("keyup", function () {
    let val = this.value;
    let msg = document.getElementById("strengthMsg");

    if (val.length < 6) {
        msg.innerHTML = "Weak password";
        msg.style.color = "red";
    } else if (val.length < 10) {
        msg.innerHTML = "Medium strength";
        msg.style.color = "orange";
    } else {
        msg.innerHTML = "Strong password";
        msg.style.color = "green";
    }
});
</script>

{% endblock %}
