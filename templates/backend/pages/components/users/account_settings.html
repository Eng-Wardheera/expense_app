{% extends 'backend/home/base.html' %}

{% block title %}Account Settings{% endblock %}

{% block content %}


<!-- [ page-header ] start -->
<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title">
            <h5 class="m-b-10">Users</h5>
        </div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item">Profile Update</li>
        </ul>
    </div>
    <div class="page-header-right ms-auto">
        <div class="page-header-right-items">
            <div class="d-flex d-md-none">
                <a href="javascript:void(0)" class="page-header-right-close-toggle">
                    <i class="feather-arrow-left me-2"></i>
                    <span>Back</span>
                </a>
            </div>
            <div class="d-flex align-items-center gap-2 page-header-right-items-wrapper">
                <a href="javascript:void(0);" class="btn btn-light-brand successAlertMessage">
                    <i class="feather-layers me-2"></i>
                    <span>Save as Draft</span>
                </a>
                <a href="javascript:void(0);" class="btn btn-primary successAlertMessage">
                    <i class="feather-user-plus me-2"></i>
                    <span>Create Customer</span>
                </a>
            </div>
        </div>
        <div class="d-md-none d-flex align-items-center">
            <a href="javascript:void(0)" class="page-header-right-open-toggle">
                <i class="feather-align-right fs-20"></i>
            </a>
        </div>
    </div>
</div>
<!-- [ page-header ] end -->

<br>



<div class="main-content">
    <div class="row">

        <div class="col-lg-12">

            <form method="POST" enctype="multipart/form-data">

                <div class="card">

                    <div class="card-header">
                        <h4 class="card-title mb-0">
                            Account Settings
                        </h4>
                    </div>

                    <div class="card-body">

                        <!-- Profile Photo -->
                        <div class="text-center mb-4">

                            {% if user.photo %}
                               <img src="{{ user.photo }}"
                                    class="rounded-circle mb-3 shadow"
                                    width="130"
                                    height="130"
                                    style="object-fit: cover;">
                            {% else %}
                                <img src="{{ url_for('static', filename='backend/uploads/images/no_image.jpg') }}"
                                     class="rounded-circle shadow"
                                     width="120"
                                     height="120">
                            {% endif %}

                            <div class="mt-3">
                                <input type="file"
                                       name="photo"
                                       class="form-control">
                            </div>

                        </div>

                        <div class="row">

                            <!-- Full Name -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Full Name
                                </label>
                                <input type="text"
                                       name="fullname"
                                       class="form-control"
                                       value="{{ user.fullname or '' }}">
                            </div>

                            <!-- Username -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Username
                                </label>
                                <input type="text"
                                       name="username"
                                       class="form-control"
                                       value="{{ user.username or '' }}">
                            </div>

                            <!-- Email -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Email
                                </label>
                                <input type="email"
                                       class="form-control"
                                       value="{{ user.email }}"
                                       readonly>
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Phone
                                </label>
                                <input type="text"
                                       name="phone"
                                       class="form-control"
                                       value="{{ user.phone or '' }}">
                            </div>

                            <!-- Country -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Country
                                </label>
                                <input type="text"
                                       name="country"
                                       class="form-control"
                                       value="{{ user.country or '' }}">
                            </div>

                            <!-- State -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    State
                                </label>
                                <input type="text"
                                       name="state"
                                       class="form-control"
                                       value="{{ user.state or '' }}">
                            </div>

                            <!-- City -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    City
                                </label>
                                <input type="text"
                                       name="city"
                                       class="form-control"
                                       value="{{ user.city or '' }}">
                            </div>

                            <!-- Gender -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Gender
                                </label>

                                <select name="gender"
                                        class="form-control">

                                    <option value="">
                                        Select Gender
                                    </option>

                                    <option value="Male"
                                        {% if user.gender == "Male" %}selected{% endif %}>
                                        Male
                                    </option>

                                    <option value="Female"
                                        {% if user.gender == "Female" %}selected{% endif %}>
                                        Female
                                    </option>

                                </select>
                            </div>

                            <!-- Address -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label">
                                    Address
                                </label>

                                <textarea name="address"
                                          rows="3"
                                          class="form-control">{{ user.address or '' }}</textarea>
                            </div>

                            <!-- Bio -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label">
                                    Bio
                                </label>

                                <textarea name="bio"
                                          rows="4"
                                          class="form-control">{{ user.bio or '' }}</textarea>
                            </div>

                        </div>

                    </div>

                    <div class="card-footer text-end">

                        <button type="submit"
                                class="btn btn-primary">
                            <i class="feather-save me-1"></i>
                            Save Changes
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
