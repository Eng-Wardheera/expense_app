{% extends 'backend/home/base.html' %}

{% block title %}Edit Saving Transaction{% endblock %}

{% block content %}

<div class="main-content mt-4">

<form method="POST">

<div class="card shadow-sm">

    <!-- HEADER -->
    <div class="card-header">
        <h5 class="mb-0">Edit Saving Transaction</h5>
    </div>

    <div class="card-body">

        <!-- ACCOUNT -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label fw-bold">
                Account
            </label>

            <div class="col-lg-9">

                <select name="account_id" class="form-select" required>

                    {% for acc in accounts %}

                    <option value="{{ acc._id }}"
                        {% if acc._id|string == trx.account_id|string %}selected{% endif %}>

                        {{ acc.name }} | {{ acc.balance }}

                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- TYPE -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label fw-bold">
                Type
            </label>

            <div class="col-lg-9">

                <select name="transaction_type" class="form-select">

                    <option value="deposit"
                        {% if trx.transaction_type == "deposit" %}selected{% endif %}>
                        Deposit
                    </option>

                    <option value="withdrawal"
                        {% if trx.transaction_type == "withdrawal" %}selected{% endif %}>
                        Withdrawal
                    </option>

                </select>

            </div>

        </div>

        <!-- AMOUNT -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label fw-bold">
                Amount
            </label>

            <div class="col-lg-9">

                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control"
                       value="{{ trx.amount }}"
                       required>

            </div>

        </div>

        <!-- DESCRIPTION -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label fw-bold">
                Description
            </label>

            <div class="col-lg-9">

                <textarea name="description"
                          class="form-control"
                          rows="3">{{ trx.description }}</textarea>

            </div>

        </div>

        <!-- NOTE -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label fw-bold">
                Note
            </label>

            <div class="col-lg-9">

                <textarea name="note"
                          class="form-control"
                          rows="3">{{ trx.note }}</textarea>

            </div>

        </div>

        <!-- REFERENCE -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label fw-bold">
                Reference No
            </label>

            <div class="col-lg-9">

                <input type="text"
                       name="reference_no"
                       class="form-control"
                       value="{{ trx.reference_no or '' }}">

            </div>

        </div>

    </div>

    <!-- FOOTER -->
   <div class="card-footer text-end d-flex justify-content-end" style="gap: 10px;">

        <button type="submit" class="btn btn-primary">
            Update Transaction
        </button>

        <a href="{{ url_for('main.saving_transaction_list') }}"
           class="btn btn-secondary">
            Cancel
        </a>

    </div>

</div>

</form>

</div>

{% endblock %}
