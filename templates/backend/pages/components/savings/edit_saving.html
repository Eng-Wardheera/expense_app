{% extends 'backend/home/base.html' %}

{% block title %}Edit Saving Goal{% endblock %}

{% block content %}

<div class="main-content mt-4">

<form method="POST">

<div class="card shadow-sm">

    <!-- Header -->
    <div class="card-header">
        <h4 class="mb-0">
            Edit Saving Goal
        </h4>
    </div>

    <!-- Body -->
    <div class="card-body">

        <!-- Title -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label">
                Saving Title
            </label>

            <div class="col-lg-9">
                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ saving.title }}"
                    required>
            </div>
        </div>

        <!-- Target Amount -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label">
                Target Amount
            </label>

            <div class="col-lg-9">
                <input
                    type="number"
                    step="0.01"
                    name="target_amount"
                    class="form-control"
                    value="{{ saving.target_amount }}"
                    required>
            </div>
        </div>

        <!-- Current Balance -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label">
                Current Balance
            </label>

            <div class="col-lg-9">
                <input
                    type="text"
                    class="form-control"
                    value="{{ saving.current_balance }}"
                    readonly>
            </div>
        </div>

        <!-- Account -->
        <div class="row mb-3">
            <label class="col-lg-3 col-form-label">
                Account
            </label>

            <div class="col-lg-9">

                <select
                    name="account_id"
                    class="form-select"
                    required>

                    {% for account in accounts %}

                    <option
                        value="{{ account._id }}"
                        {% if saving.account_id|string == account._id|string %}
                        selected
                        {% endif %}>

                        {{ account.name }}
                        ({{ account.balance }} {{ account.currency }})

                    </option>

                    {% endfor %}

                </select>

            </div>
        </div>

        <!-- Status -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label">
                Status
            </label>

            <div class="col-lg-9">

                <select
                    name="status"
                    class="form-select">

                    <option
                        value="active"
                        {% if saving.status=="active" %}
                        selected
                        {% endif %}>
                        Active
                    </option>

                    <option
                        value="paused"
                        {% if saving.status=="paused" %}
                        selected
                        {% endif %}>
                        Paused
                    </option>

                    <option
                        value="completed"
                        {% if saving.status=="completed" %}
                        selected
                        {% endif %}>
                        Completed
                    </option>

                </select>

            </div>

        </div>

        <!-- Maturity Date -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label">
                Maturity Date
            </label>

            <div class="col-lg-9">

               <input
                type="date"
                name="maturity_date"
                class="form-control"
                value="{{ saving.maturity_date if saving.maturity_date else '' }}">

            </div>

        </div>

        <!-- Description -->
        <div class="row mb-3">

            <label class="col-lg-3 col-form-label">
                Description
            </label>

            <div class="col-lg-9">

                <textarea
                    name="description"
                    rows="4"
                    class="form-control">{{ saving.description }}</textarea>

            </div>

        </div>

    </div>

   <div class="card-footer text-end d-flex justify-content-end" style="gap: 10px;">

    <a
        href="{{ url_for('main.saving_list') }}"
        class="btn btn-secondary">
        Cancel
    </a>

    <button
        type="submit"
        class="btn btn-primary">
        Update Saving
    </button>

</div>
    

</div>

</form>

</div>

{% endblock %}
