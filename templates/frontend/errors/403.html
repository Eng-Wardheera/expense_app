<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 - Access Denied</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    overflow:hidden;
    position:relative;
}

/* Animated Background */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.3;
}

body::before{
    width:300px;
    height:300px;
    background:#3b82f6;
    top:-100px;
    left:-100px;
}

body::after{
    width:350px;
    height:350px;
    background:#ef4444;
    bottom:-120px;
    right:-120px;
}

/* Card */
.error-card{
    width:90%;
    max-width:600px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;
    padding:50px 40px;
    text-align:center;
    color:white;
    box-shadow:
        0 10px 30px rgba(0,0,0,.25),
        inset 0 1px 1px rgba(255,255,255,.1);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

.error-code{
    font-size:120px;
    font-weight:900;
    line-height:1;
    background:linear-gradient(135deg,#60a5fa,#ffffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.error-title{
    margin-top:10px;
    font-size:32px;
    font-weight:700;
}

.error-text{
    margin-top:15px;
    color:#cbd5e1;
    font-size:16px;
    line-height:1.7;
}

/* Buttons */
.actions{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    font-weight:600;
    transition:.3s ease;
}

.btn-primary{
    background:#2563eb;
    color:white;
}

.btn-primary:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(37,99,235,.4);
}

.btn-outline{
    border:1px solid rgba(255,255,255,.2);
    color:white;
    background:rgba(255,255,255,.05);
}

.btn-outline:hover{
    background:rgba(255,255,255,.12);
}

/* Lock Icon */
.lock{
    font-size:60px;
    margin-bottom:15px;
}

/* Mobile */
@media(max-width:768px){

    .error-card{
        padding:40px 25px;
    }

    .error-code{
        font-size:90px;
    }

    .error-title{
        font-size:26px;
    }

    .error-text{
        font-size:15px;
    }
}
</style>
</head>
<body>

<div class="error-card">

    <div class="lock">🔒</div>

    <div class="error-code">403</div>

    <h2 class="error-title">Access Denied</h2>

    <p class="error-text">
        Ma lihid ogolaansho aad ku gasho boggan.
        Fadlan la xiriir maamulka haddii aad u malaynayso
        in tani ay khalad tahay.
    </p>

    <div class="actions">
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
            Dashboard
        </a>

        <a href="javascript:history.back()" class="btn btn-outline">
            Go Back
        </a>
    </div>

</div>

</body>
</html>
